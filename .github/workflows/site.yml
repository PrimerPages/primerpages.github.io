name: Build and Deploy Site

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [theme-release, force-rebuild]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        shell: bash
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  test:
    runs-on: ubuntu-latest
    name: Run site tests
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: ./artifact

      - name: Extract site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          if [ -f ./artifact/artifact.tar ]; then
            tar --directory _site -xvf ./artifact/artifact.tar
          else
            TAR_FILE="$(find ./artifact -maxdepth 2 -type f -name '*.tar' | head -n1)"
            if [ -n "$TAR_FILE" ]; then
              tar --directory _site -xvf "$TAR_FILE"
            else
              cp -R ./artifact/. _site/
            fi
          fi

      - name: Cache HTMLProofer
        uses: actions/cache@v5
        with:
          path: tmp/.htmlproofer
          key: ${{ runner.os }}-htmlproofer

      - name: Test with htmlproofer
        uses: athackst/htmlproofer-action@v2.0.0

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-htmlproofer
          path: tmp/.htmlproofer
